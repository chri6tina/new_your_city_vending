name: Monthly Blog Post Generator

on:
  schedule:
    # Runs at 9am UTC on the 1st of every month
    - cron: '0 9 1 * *'
  workflow_dispatch: # Also allows manual trigger from GitHub UI

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate blog post
        run: |
          # Get current month and year for the post
          MONTH=$(date +"%B")
          YEAR=$(date +"%Y")
          MONTH_NUM=$(date +"%m")
          DATE=$(date +"%Y-%m-%d")
          SLUG="nyc-vending-tips-${MONTH_NUM}-${YEAR}"
          FILENAME="content/blog/${SLUG}.md"

          # Rotate through topics based on month number
          MONTH_INDEX=$(date +"%m" | sed 's/^0//')

          case $MONTH_INDEX in
            1)  TOPIC="New Year Office Upgrades"
                TITLE="Start the New Year Right: Upgrade Your NYC Office Breakroom in ${YEAR}"
                DESC="January is the perfect time to improve your workplace. Here's how NYC businesses are adding free vending and micro market services at zero cost."
                FOCUS="New year, new office perks"
                ;;
            2)  TOPIC="Valentine's Day Office Perks"
                TITLE="Show Your NYC Team Some Love: Free Snacks and Refreshments for Your Office"
                DESC="Employee appreciation doesn't have to cost a fortune. Discover how NYC businesses are boosting morale with free vending and pantry services."
                FOCUS="Employee appreciation and retention"
                ;;
            3)  TOPIC="Spring Office Refresh"
                TITLE="Spring Cleaning Your NYC Office? Don't Forget the Breakroom"
                DESC="Spring is the perfect time to refresh your workplace amenities. NYC businesses are upgrading to micro markets and modern vending solutions for free."
                FOCUS="Office refresh and modernization"
                ;;
            4)  TOPIC="Earth Month Healthy Snacks"
                TITLE="Healthy Vending Options for NYC Offices: What's Available in ${YEAR}"
                DESC="More NYC businesses are requesting healthier vending and micro market options. Here's what's available and how to customize your selections."
                FOCUS="Healthy snack options and wellness"
                ;;
            5)  TOPIC="Summer Office Hydration"
                TITLE="Keeping Your NYC Team Hydrated This Summer: Vending and Beverage Solutions"
                DESC="Summer heat means your NYC office needs better beverage options. Here's how free vending and cold drink stations keep teams productive."
                FOCUS="Summer beverages and hydration"
                ;;
            6)  TOPIC="Mid-Year Employee Benefits"
                TITLE="Mid-Year Check-In: Are Your NYC Office Perks Competitive in ${YEAR}?"
                DESC="With hiring competition fierce in NYC, free workplace snacks and micro markets have become a key employee benefit. Here's what competitors are offering."
                FOCUS="Employee benefits and retention"
                ;;
            7)  TOPIC="Summer Productivity"
                TITLE="How NYC Warehouses and Offices Keep Teams Productive During Summer"
                DESC="Summer slowdowns are real in NYC. Free vending and refreshment services help keep warehouse and office teams energized through the heat."
                FOCUS="Warehouse and logistics teams"
                ;;
            8)  TOPIC="Back to Office Season"
                TITLE="Back to Office Season: Why NYC Companies Are Adding Micro Markets Now"
                DESC="Fall return-to-office pushes are driving demand for better workplace amenities. NYC businesses are adding free micro markets to make the office more appealing."
                FOCUS="Return to office and hybrid work"
                ;;
            9)  TOPIC="Fall Office Planning"
                TITLE="Planning Your NYC Office for Q4: Vending and Refreshment Checklist"
                DESC="Q4 is the busiest time for NYC businesses. Make sure your breakroom is ready with this free vending and micro market planning guide."
                FOCUS="Q4 planning and productivity"
                ;;
            10) TOPIC="Holiday Season Prep"
                TITLE="Get Your NYC Office Ready for the Holidays: Refreshment Planning Guide"
                DESC="The holiday season brings more people to the office. NYC businesses use free vending and micro market services to handle increased breakroom demand."
                FOCUS="Holiday season office planning"
                ;;
            11) TOPIC="End of Year Benefits"
                TITLE="End-of-Year Employee Perks: What NYC Businesses Are Adding Before ${YEAR} Ends"
                DESC="Year-end is the most popular time for NYC businesses to add new employee perks. Free vending and micro market services top the list."
                FOCUS="Year-end employee perks"
                ;;
            12) TOPIC="New Year Planning"
                TITLE="${YEAR} Planning: Why NYC Businesses Are Investing in Free Workplace Amenities"
                DESC="As NYC businesses plan for the new year, free vending and micro market services are becoming standard. Here's what to consider for your office."
                FOCUS="Annual planning and office amenities"
                ;;
          esac

          # Write the blog post
          mkdir -p content/blog
          cat > "$FILENAME" << EOF
          ---
          title: "${TITLE}"
          date: "${DATE}"
          description: "${DESC}"
          slug: "${SLUG}"
          tags: ["nyc", "vending machines", "office", "${MONTH_NUM}"]
          ---

          ## ${TOPIC}: What NYC Businesses Need to Know

          As we head into ${MONTH} ${YEAR}, New York City businesses are continuing to look for ways to improve their workplace experience — without adding to the bottom line.

          One of the most overlooked opportunities: **free vending machines and micro market services.**

          ## Why ${MONTH} Is a Good Time to Add Vending Service

          ${FOCUS} is top of mind for many NYC business owners right now. The good news is that adding a fully stocked vending machine or micro market to your office, warehouse, or facility costs your business absolutely nothing.

          We handle everything:

          - **Free installation** — we bring the equipment and set it up
          - **Full stocking** — snacks, drinks, fresh food, and more
          - **Ongoing restocking** — we monitor and replenish automatically
          - **All maintenance** — any repairs or issues are on us
          - **No contracts** — flexible, no long-term commitment

          ## Who We Serve in New York City

          Our team serves businesses across all five NYC boroughs — Manhattan, Brooklyn, Queens, The Bronx, and Staten Island — as well as Long Island, Westchester, and northern New Jersey.

          Whether you run a 25-person office in Midtown, a 200-employee warehouse in Long Island City, or a medical practice in Park Slope, we can find the right solution for your space.

          ## How to Get Started This ${MONTH}

          The process is simple:

          1. **Reach out** — fill out the form on our site or give us a call
          2. **Free site visit** — we come to you, no obligation
          3. **Installation** — usually within 5–7 business days
          4. **Done** — we handle everything from there

          There's no better time to upgrade your breakroom than now.

          [Request a Free Site Visit →](/#contact)
          EOF

          echo "Generated blog post: $FILENAME"

      - name: Commit and push
        run: |
          git config user.name "NYC Vending Bot"
          git config user.email "bot@nycvending.com"
          git add content/blog/
          git diff --staged --quiet || git commit -m "Auto-generate blog post for $(date +'%B %Y')"
          git push
